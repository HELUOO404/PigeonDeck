<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .target{position:relative;display:inline-block}
</style>
</head>
<body>
  <div class="wp">
    <h1 class="wp-h">概览</h1>
    <p class="wp-sub">本月数据与活动入口</p>
    <div class="wp-card" style="max-width:236px">
      <div style="font-weight:600;margin-bottom:6px;color:#11161c">订阅计划</div>
      <p class="wp-p" style="margin-bottom:14px">升级后解锁全部导出能力。</p>
      <div class="target">
        <button class="wp-btn">立即开始</button>
        <!-- hover 高亮 + 元素 hover 标签（9px） -->
        <div class="pd-hover" style="inset:-3px"></div>
        <div class="pd-hlabel" style="left:0;top:-20px">button</div>
      </div>
    </div>
  </div>
</body>
</html>
