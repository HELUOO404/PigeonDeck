<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .wp{padding:0;background:#e9e6dc;display:flex;align-items:center;justify-content:center}
  .popup{width:288px;overflow:hidden}
  .phead{display:flex;align-items:center;gap:11px;padding:14px 15px;border-bottom:1px solid var(--cbd)}
  .phead .ball{width:30px;height:30px;border-radius:50%;background:var(--c1);
    display:flex;align-items:center;justify-content:center;color:#fdf6e6;flex:none}
  .phead .ball svg{width:17px;height:17px}
  .pname{font-family:var(--font-serif);font-weight:600;font-size:15px;color:var(--ctx);line-height:1.2}
  .psite{font-size:11px;color:var(--ctx2);margin-top:2px}
  .pbd{padding:12px 15px 14px}
  .stat{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:var(--r-ctl);
    background:rgba(92,138,74,.10);border:1px solid rgba(92,138,74,.3);color:var(--ctx);font-size:12.5px;margin-bottom:6px}
  .stat .dot{width:7px;height:7px;border-radius:50%;background:var(--cs);flex:none;box-shadow:0 0 0 3px rgba(92,138,74,.18)}
  .lnk{display:flex;align-items:center;justify-content:space-between;padding:9px 0;cursor:pointer}
  .lnk:hover .k{color:var(--c1)}
  .notice{display:flex;gap:8px;padding:9px 10px;border-radius:var(--r-ctl);font-size:11.5px;line-height:1.5;
    border:1px solid var(--cbd);background:var(--cbg);color:var(--ctx2);margin-top:8px}
  .notice svg{width:15px;height:15px;flex:none;margin-top:1px}
  .notice.warn{border-color:rgba(178,58,46,.35);background:rgba(178,58,46,.07);color:var(--ctx)}
  .notice.warn svg{color:var(--cd)}
</style>
</head>
<body>
  <div class="wp">
    <div class="pd-surface popup">
      <div class="phead">
        <span class="ball"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.6 15.2Q10 9.2 17 10.1Q12.8 14.2 7.4 16.1Q5.7 16.6 4.6 15.2ZM9 12.6Q12 5.9 18.8 5Q16.4 9.8 12.4 11.7Q10.5 12.7 9 12.6ZM16.7 10L20.4 8.9 17.2 11.4Z"/></svg></span>
        <div>
          <div class="pname">PigeonDeck</div>
          <div class="psite">当前站点 · 运行中</div>
        </div>
      </div>
      <div class="pbd">
        <div class="stat"><span class="dot"></span>扩展运行中 · 本页支持标注</div>

        <div class="pd-srow"><span class="k">全局禁用</span><button class="pd-switch" aria-pressed="false"></button></div>
        <div class="pd-srow"><span class="k">在当前站点禁用</span><button class="pd-switch" aria-pressed="false"></button></div>
        <div class="pd-srow lnk"><span class="k">禁用站点列表</span>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ctx2)"><path d="m9 18 6-6-6-6"/></svg></div>

        <div class="notice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v5h5"/></svg>
          <span>file:// 页面需在扩展详情中开启「允许访问文件网址」。</span>
        </div>
        <div class="notice warn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
          <span>此页为 PDF，V1 暂不支持标注。</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
