<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
</style>
</head>
<body>
  <div class="wp">
    <h1 class="wp-h">已标注</h1>
    <p class="wp-sub">点击位号圆展开批注卡片</p>
    <div style="position:relative;display:inline-block;margin-top:10px">
      <div class="wp-card" style="width:240px">
        <div style="font-weight:600;color:#11161c;margin-bottom:6px">价格说明</div>
        <p class="wp-p" style="margin:0">标准版每月 ¥39，含基础导出。</p>
      </div>
      <!-- 标注框（收起态）+ 左上角位号圆 -->
      <div class="pd-markbox" style="inset:-3px"></div>
      <div class="pd-pin" style="left:-11px;top:-11px">1</div>
    </div>

    <div style="position:relative;display:inline-block;margin:14px 0 0 14px;vertical-align:top">
      <button class="wp-btn ghost" style="position:relative">了解更多</button>
      <div class="pd-markbox" style="inset:-3px"></div>
      <div class="pd-pin" style="left:-11px;top:-11px">2</div>
    </div>
  </div>
</body>
</html>
