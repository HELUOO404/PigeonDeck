<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../pigeonlib.css">
<style>
  html,body{margin:0;height:100%}
  .wp{padding:0;background:repeating-linear-gradient(0deg,#fbfbfc,#fbfbfc 26px,#f6f7f9 26px,#f6f7f9 27px)}
  .dock{position:absolute;left:22px;top:14px}
  /* 清空按钮危险态 */
  .clearbtn{color:var(--cd)!important;background:rgba(178,58,46,.10)!important}
  .confirm{position:absolute;left:84px;top:206px;width:206px;padding:13px}
  .confirm::before{content:"";position:absolute;left:-7px;top:34px;width:12px;height:12px;
    background:var(--csf);border-left:1px solid var(--cbd);border-bottom:1px solid var(--cbd);
    transform:rotate(45deg)}
  .confirm .msg{font-size:13px;color:var(--ctx);line-height:1.5;margin-bottom:11px}
  .confirm .row{display:flex;justify-content:flex-end;gap:7px}
  .confirm .pd-btn{min-height:28px;padding:0 12px}
</style>
</head>
<body>
  <div class="wp">
    <div class="dock">
      <div class="pd-toolbar is-active">
        <button class="pd-tbtn brand"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.6 15.2Q10 9.2 17 10.1Q12.8 14.2 7.4 16.1Q5.7 16.6 4.6 15.2ZM9 12.6Q12 5.9 18.8 5Q16.4 9.8 12.4 11.7Q10.5 12.7 9 12.6ZM16.7 10L20.4 8.9 17.2 11.4Z"/></svg></button>
        <div class="pd-div"></div>
        <button class="pd-tbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><path d="M2 12h20"/><path d="M12 2v20"/></svg></button>
        <button class="pd-tbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></button>
        <button class="pd-tbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg></button>
        <div class="pd-undoredo">
          <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a4 4 0 0 1 0 8h-4"/></svg></button>
          <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a4 4 0 0 0 0 8h4"/></svg></button>
        </div>
        <!-- 清空按钮：危险态 -->
        <button class="pd-tbtn clearbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg></button>
        <button class="pd-tbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg></button>
      </div>
    </div>

    <!-- 贴近清空按钮的小确认弹层 -->
    <div class="pd-surface confirm">
      <div class="msg">清除当前页全部批注？此操作不可撤销。</div>
      <div class="row">
        <button class="pd-btn ghost">取消</button>
        <button class="pd-btn danger">确认清空</button>
      </div>
    </div>
  </div>
</body>
</html>
